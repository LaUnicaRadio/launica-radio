<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Unica — Radio</title>
<style>
  :root {
    --bg: #16130f;          /* warm off-black */
    --panel: #1e1a15;
    --line: #35302733;
    --line-solid: #383228;
    --ink: #ece5d8;         /* warm bone */
    --dim: #948b7c;
    --clay: #7fa86b;        /* dusty moss green — primary accent */
    --teal: #4e7d6c;        /* deep pine */
    --sand: #b9c48a;        /* pale sage */
    --red: #d5544a;         /* on-air, slightly muted */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: "SF Mono", ui-monospace, Menlo, "Cascadia Mono", monospace;
    color: var(--ink);
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 28px 18px 40px;
    display: flex;
    flex-direction: column;
    line-height: 1.5;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* faint ambient wash */
  .glow {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(55% 40% at 20% 0%, rgba(201,106,82,.07), transparent 70%),
      radial-gradient(45% 35% at 85% 30%, rgba(123,163,158,.06), transparent 70%);
  }

  header {
    display: flex; justify-content: space-between; align-items: baseline;
    letter-spacing: .3em; font-size: .78rem; color: var(--dim);
    text-transform: uppercase;
    padding-bottom: 16px;
  }
  header .name { color: var(--ink); }

  /* ── player card ── */
  .player {
    border: 1px solid var(--line-solid);
    border-radius: 10px;
    background: var(--panel);
    padding: 26px 24px;
    position: relative;
    overflow: hidden;
  }
  .player::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--clay), var(--sand), var(--teal), var(--clay));
    background-size: 250% 100%;
    animation: strip 16s linear infinite;
    opacity: .8;
  }
  @keyframes strip { to { background-position: 250% 0 } }

  .art {
    width: 100%;
    aspect-ratio: 1;
    max-height: 340px;
    object-fit: cover;
    border-radius: 8px;
    background:
      radial-gradient(60% 60% at 50% 40%, #2b2118, var(--panel));
    display: block;
    margin-bottom: 22px;
  }

  .live {
    font-size: .68rem; letter-spacing: .3em; color: var(--dim);
    display: flex; align-items: center; gap: 8px;
    text-transform: uppercase;
  }
  .live .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 0 0 rgba(213,84,74,.45);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(213,84,74,.45) }
    70% { box-shadow: 0 0 0 10px rgba(213,84,74,0) }
    100% { box-shadow: 0 0 0 0 rgba(213,84,74,0) }
  }

  .title {
    font-weight: 700; font-size: 1.25rem; margin-top: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .artist {
    color: var(--sand); font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .controls { display: flex; align-items: center; gap: 16px; margin-top: 20px; }
  .controls button {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid var(--line-solid); cursor: pointer; font-size: 17px;
    background: transparent; color: var(--ink);
    font-family: inherit;
    transition: border-color .2s, box-shadow .2s, transform .1s;
  }
  .controls button:hover { border-color: var(--clay); box-shadow: 0 0 16px rgba(201,106,82,.3); }
  .controls button:active { transform: scale(.94); }
  .controls button:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; }
  .controls input[type=range] { flex: 1; accent-color: var(--clay); }

  /* equalizer — animates only while playing */
  .eq { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
  .eq span {
    width: 4px; border-radius: 2px 2px 0 0;
    transform: scaleY(.25); transform-origin: bottom;
  }
  .eq span:nth-child(1){ background: var(--clay); height: 60% }
  .eq span:nth-child(2){ background: var(--sand); height: 95% }
  .eq span:nth-child(3){ background: var(--teal); height: 50% }
  .eq span:nth-child(4){ background: var(--clay); height: 80% }
  body.playing .eq span { animation: eq 1.1s ease-in-out infinite; }
  body.playing .eq span:nth-child(2){ animation-delay: .15s }
  body.playing .eq span:nth-child(3){ animation-delay: .3s }
  body.playing .eq span:nth-child(4){ animation-delay: .45s }
  @keyframes eq { 0%,100% { transform: scaleY(.3) } 50% { transform: scaleY(1) } }

  /* ── recently played ── */
  .history {
    border: 1px solid var(--line-solid);
    border-left: 3px solid var(--teal);
    border-radius: 10px;
    background: var(--panel);
    padding: 18px 22px;
    margin-top: 22px;
  }
  .history h2 {
    font-size: .68rem; letter-spacing: .3em; color: var(--teal);
    text-transform: uppercase; margin-bottom: 12px; font-weight: 400;
  }
  .history ul { list-style: none; }
  .history li {
    padding: 7px 6px;
    font-size: .85rem;
    display: flex; justify-content: space-between; gap: 12px;
    border-radius: 4px;
    transition: background .15s;
  }
  .history li:hover { background: rgba(236,229,216,.04); }
  .history li + li { border-top: 1px solid var(--line); }
  .history .t { color: var(--dim); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .history li:hover .t { color: var(--sand); }
  .offline { color: var(--dim); font-style: italic; }

  footer {
    margin-top: auto; padding-top: 36px;
    color: var(--dim); font-size: .72rem; letter-spacing: .25em;
    text-align: center; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <header>
    <span class="name">La Unica Radio</span>
    <span>web radio</span>
  </header>

  <div class="player">
    <img id="art" class="art" alt="" src="" style="visibility:hidden" onload="this.style.visibility='visible'">
    <div class="live"><span class="dot"></span> On Air <span id="clock" style="margin-left:auto; letter-spacing:.1em"></span></div>
    <div class="title" id="title">Tuning in…</div>
    <div class="artist" id="artist"></div>
    <div class="controls">
      <button id="play" aria-label="Play">▶</button>
      <input id="vol" type="range" min="0" max="1" step="0.05" value="0.9" aria-label="Volume">
      <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="history">
    <h2>Recently played</h2>
    <ul id="hist"><li class="offline">Loading…</li></ul>
  </div>

  <footer>La Unica © <span id="yr"></span></footer>

<script>
(() => {
  const STATION = "la_unixa";
  // pointer.json lives next to this page and is auto-updated by the radio server
  const POINTER = "pointer.json";

  let host = null;
  const $ = id => document.getElementById(id);
  $("yr").textContent = new Date().getFullYear();

  setInterval(() => {
    $("clock").textContent = new Date().toLocaleTimeString("es-CO", { hour12: false, timeZone: "America/Bogota" });
  }, 1000);

  const audio = new Audio();
  audio.preload = "none";
  let playing = false;

  $("play").onclick = () => {
    if (!host) return;
    if (playing) {
      audio.pause(); audio.src = "";
      $("play").textContent = "▶";
      document.body.classList.remove("playing");
    } else {
      audio.src = `${host}/listen/${STATION}/radio.mp3?t=${Date.now()}`;
      audio.volume = $("vol").value;
      audio.play();
      $("play").textContent = "❚❚";
      document.body.classList.add("playing");
    }
    playing = !playing;
  };
  $("vol").oninput = () => audio.volume = $("vol").value;

  async function getHost() {
    try {
      const r = await fetch(`${POINTER}?t=${Date.now()}`);
      const j = await r.json();
      if (j.host && j.host !== host) {
        host = j.host;
      }
    } catch (e) { /* keep last known host */ }
  }

  async function refresh() {
    if (!host) await getHost();
    if (!host) return;
    try {
      const r = await fetch(`${host}/api/nowplaying_static/${STATION}.json?t=${Date.now()}`);
      const d = await r.json();
      const np = d.now_playing || {};
      const s = np.song || {};
      $("title").textContent = d.is_online ? (s.title || "—") : "Station offline";
      $("artist").textContent = d.is_online ? (s.artist || "") : "check back soon";
      if (s.art) $("art").src = s.art;
      const hist = (d.song_history || []).slice(0, 6);
      $("hist").innerHTML = hist.length
        ? hist.map(h => {
            const t = new Date(h.played_at * 1000);
            const hh = t.getHours().toString().padStart(2,"0");
            const mm = t.getMinutes().toString().padStart(2,"0");
            return `<li><span>${h.song.artist} — ${h.song.title}</span><span class="t">${hh}:${mm}</span></li>`;
          }).join("")
        : '<li class="offline">Nothing yet</li>';
    } catch (e) {
      // tunnel may have rotated: re-resolve pointer next tick
      host = null;
    }
  }

  getHost().then(refresh);
  setInterval(refresh, 12000);
  setInterval(getHost, 60000);
})();
</script>
</body>
</html>
